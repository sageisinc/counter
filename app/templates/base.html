<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Counter{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .navbar { background: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .navbar h1 { color: #38bdf8; font-size: 1.5rem; }
        .navbar a { color: #94a3b8; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; transition: all 0.2s; }
        .navbar a:hover { background: #334155; color: #e2e8f0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #f87171; }
        .btn-success { background: #22c55e; color: white; }
        .btn-success:hover { background: #4ade80; }
        .btn-warning { background: #f59e0b; color: #0f172a; }
        .btn-warning:hover { background: #fbbf24; }
        .btn-secondary { background: #475569; color: white; }
        .btn-secondary:hover { background: #64748b; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #94a3b8; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.6rem 0.8rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #38bdf8; }
        .error { background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
{% block navbar %}{% endblock %}
{% block content %}{% endblock %}
</body>
</html>
