{% extends "base.html" %}
{% block title %}Register - Counter{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <div class="card" style="width:100%;max-width:400px;">
    <h2 style="text-align:center;margin-bottom:1.5rem;color:#38bdf8;">Create Account</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Register</button>
    </form>
    <p style="text-align:center;margin-top:1rem;color:#94a3b8;">
      Have an account? <a href="/login" style="color:#38bdf8;">Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
