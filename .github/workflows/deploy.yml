name: CI/CD - Counter App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # inputs:
    #   name:
    #   description: 'Who to greet'
    #   required: true
    #   default: 'World'
    # environment:
    #   description: 'Deployment environment'
    #   type: choice
    #   options:
    #   - staging
    #   - production
    #   default: staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_VERSION: "1.9.0"
  ANSIBLE_VERSION: "10.0.0"

jobs:
  # ─── Test ───────────────────────────────────────────────
  test:
    name: Test Application
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: counterdb_test
          POSTGRES_USER: counter
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest

      - name: Run smoke test
        env:
          DATABASE_URL: postgresql://counter:testpassword@localhost:5432/counterdb_test
          SECRET_KEY: test-secret
        run: |
          cd app
          python -c "
          from app import app, db
          with app.app_context():
              db.create_all()
              print('DB init OK')
          with app.test_client() as c:
              r = c.get('/')
              assert r.status_code in [200, 302], f'Got {r.status_code}'
              print('App smoke test OK')
          "

  # ─── Terraform Plan ──────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: self-hosted
    needs: test
    #if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -reconfigure

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_os_password: ${{ secrets.OS_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_app_secret_key: ${{ secrets.APP_SECRET_KEY }}
        run: terraform plan -no-color
        continue-on-error: true

  # ─── Deploy ──────────────────────────────────────────────
  deploy:
    name: Deploy to OpenStack
    runs-on: self-hosted
    needs: [test, terraform-plan]
    #if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    #environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/counter_deploy_key
          chmod 600 ~/.ssh/counter_deploy_key
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/counter_deploy_key.pub

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -reconfigure
      - name: Cleanup OpenStack resources before apply
        run: |
          source /home/sage/kolla-venv/bin/activate
          export OS_PROJECT_DOMAIN_NAME='Default'
          export OS_USER_DOMAIN_NAME='Default'
          export OS_PROJECT_NAME='admin'
          export OS_USERNAME='admin'
          export OS_PASSWORD='${{ secrets.OS_PASSWORD }}'
          export OS_AUTH_URL='http://192.168.131.100:5000'
          export OS_INTERFACE='public'
          export OS_IDENTITY_API_VERSION='3'
          export OS_REGION_NAME='RegionOne'
          openstack keypair delete counter-key 2>/dev/null || true
          openstack security group delete counter-app-sg 2>/dev/null || true
        shell: bash
      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_os_password: ${{ secrets.OS_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_app_secret_key: ${{ secrets.APP_SECRET_KEY }}
        run: |
          terraform apply -auto-approve
          echo "APP_SERVER_IP=$(terraform output -raw app_server_ip)" >> $GITHUB_ENV

      - name: Wait for OpenStack resources
        run: |
          echo "Waiting for OpenStack resources to be ready..."
          sleep 60
      - name: Show Terraform outputs
        working-directory: terraform
        run: terraform output -no-color
     
      - name: PIP upgrade
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip cache purge
          python3 -m pip install "ansible>=10.0.0,<11.0.0" --break-system-packages --no-cache-dir
      - name: Generate Ansible inventory
        run: |
          envsubst < ansible/inventory.ini.tpl > ansible/inventory.ini
          cat ansible/inventory.ini

      - name: Install Ansible
        run: |
          pip install "ansible>=10.0.0,<11.0.0" --break-system-packages

      - name: Wait for SSH
        run: |
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i ~/.ssh/counter_deploy_key ubuntu@${{ env.APP_SERVER_IP }} \
              "echo ready" && break
            echo "Waiting for SSH... ($i/30)"
            sleep 10
          done

      - name: Run Ansible playbook
        working-directory: ansible
        env:
          APP_REPO: ${{ github.server_url }}/${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
        run: |
          ansible-playbook -i inventory.ini deploy.yml -v

      - name: Verify deployment
        run: |
          sleep 10
          curl -f http://${{ env.APP_SERVER_IP }} || exit 1
          echo "Deployment verified at http://${{ env.APP_SERVER_IP }}"

      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${{ env.APP_SERVER_IP }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
